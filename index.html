<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Systems Lab — Backend, HLD &amp; LLD Learning</title>
  <meta name="description" content="Learn backend distributed systems, high-level design, and low-level design with interactive diagrams — one payment platform example throughout." />
  <script>
    (function () {
      var bust = sessionStorage.getItem("dsl_bust");
      if (!bust) {
        bust = String(Date.now());
        sessionStorage.setItem("dsl_bust", bust);
      }
      window.__DSL_BUST__ = bust;
      var link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = "./styles/main.css?v=" + encodeURIComponent(bust);
      document.head.appendChild(link);
    })();
  </script>
</head>
<body>
  <div id="shell">
    <aside id="sidebar" aria-label="Topic navigation">
      <div class="sidebar-head">
        <a href="#/" class="brand" aria-label="Home">
          <span class="brand-mark"></span>
          <span class="brand-text">Distributed Systems Lab</span>
        </a>
        <button id="sidebar-toggle" class="icon-btn" aria-label="Toggle navigation">≡</button>
      </div>
      <div class="sidebar-search">
        <input id="search" type="search" placeholder="Search topics…" autocomplete="off" />
      </div>
      <nav id="nav" class="nav" aria-label="Categories"></nav>
    </aside>

    <main id="main">
      <header id="topbar">
        <button id="mobile-nav" class="icon-btn" aria-label="Open navigation">≡</button>
        <div id="crumbs" class="crumbs"></div>
      </header>
      <div id="app" class="app"></div>
    </main>
  </div>

  <script type="module">
    const bust = window.__DSL_BUST__ || String(Date.now());
    import(`./js/app.js?v=${encodeURIComponent(bust)}`);
  </script>
</body>
</html>
